services:
  postgres:
    image: postgres:16-alpine
    container_name: vaultguard_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: vaultguard
      POSTGRES_PASSWORD: vaultguard
      POSTGRES_DB: vaultguard
    ports:
      - "5438:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
