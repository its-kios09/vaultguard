version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: vaultguard-db
    restart: always
    environment:
      POSTGRES_USER: vaultguard
      POSTGRES_PASSWORD: vaultguard_prod_2026
      POSTGRES_DB: vaultguard
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaultguard"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: vaultguard-api
    restart: always
    ports:
      - "3001:3001"
    env_file:
      - .env.prod
    depends_on:
      postgres:
        condition: service_healthy

  platform:
    build:
      context: .
      dockerfile: apps/platform/Dockerfile
      args:
        VITE_API_URL: https://discovered-soundtrack-essence-charity.trycloudflare.com
        VITE_AUTH0_DOMAIN: dev-e4jfj18ze4bq2ych.us.auth0.com
        VITE_AUTH0_CLIENT_ID: CArS28cUyjpNZF8F38QWEE6BWCqVIWwO
        VITE_AUTH0_REDIRECT_URI: https://euros-patrick-determines-zoo.trycloudflare.com/callback
    container_name: vaultguard-platform
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  pgdata:
